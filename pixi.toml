[workspace]
name = "pg_gpu"
version = "0.1.0"
description = "GPU-accelerated population genetics statistics"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.12,<3.13"
numpy = ">=2.0"
scipy = ">=1.12"
pandas = ">=2.0"
scikit-allel = ">=1.3"
msprime = ">=1.0"
h5py = ">=3.0"
tqdm = ">=4.0"
zarr = ">=2.16"

[pypi-dependencies]
pg_gpu = { path = ".", editable = true }
bio2zarr = { version = ">=0.1", extras = ["vcf"] }

# Streaming-from-zarr uses kvikio + nvCOMP to decode store chunks on the
# GPU when the codec is GPU-decodable (zstd / blosc / lz4 / deflate).
# Hard dependency: pg_gpu is GPU-first and the streaming dispatch always
# imports these unconditionally. Conda-forge's kvikio is cuda13/cp311
# only at the moment, so we go through NVIDIA's PyPI index.
"kvikio-cu12" = ">=25.0"
"nvidia-nvcomp-cu12" = ">=4.0"

[pypi-options]
extra-index-urls = ["https://pypi.nvidia.com"]

[feature.gpu.dependencies]
cupy = ">=13.0"
cuda-version = "12.*"
notebook = ">=7.5.5,<8"

[feature.gpu.system-requirements]
cuda = "12"

[feature.dev.dependencies]
pytest = ">=7.0"
pytest-xdist = ">=3.0"
ipython = ">=8.0"
ipykernel = ">=6.0"
ruff = ">=0.4"
htslib = ">=1.19"  # provides bgzip/tabix for VCF round-trip tests

[feature.moments.pypi-dependencies]
moments-popgen = "*"
demesdraw = "*"
demes = "*"

[feature.docs.dependencies]
sphinx = ">=4.0"
sphinx-rtd-theme = ">=1.0"

[feature.lint.dependencies]
python = ">=3.12,<3.13"
ruff = ">=0.4"

[environments]
default = ["gpu", "dev", "docs"]
moments = ["gpu", "dev", "docs", "moments"]
lint = ["lint"]

[tasks]
test = { cmd = "pytest tests/ -v" }
test-parallel = { cmd = "pytest tests/ -v -n 10" }
lint = { cmd = "ruff check pg_gpu/ tests/ examples/" }
docs = { cmd = "make html", cwd = "docs" }
